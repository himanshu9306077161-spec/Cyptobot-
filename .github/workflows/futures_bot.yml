name: ViraLab Futures Bot v5

on:
 schedule:
   - cron: '*/30 * * * *'
 workflow_dispatch:

permissions:
 contents: write

jobs:
 run_bot:
   runs-on: ubuntu-latest
   timeout-minutes: 14

   steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: Setup Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.11'

     - name: Install packages
       run: pip install requests --quiet

     - name: Run Bot
       env:
         BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
         BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
         EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
         EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
         LIVE_TRADING:       ${{ secrets.LIVE_TRADING }}
         WEBSHARE_PROXY:     ${{ secrets.WEBSHARE_PROXY }}
       run: python3 futures_bot.py

     - name: Save state and keep-alive
       run: |
         git config user.email "futuresbot@github.com"
         git config user.name "FuturesBot"
         git add futures_state.json || true
         echo "$(date -u)" > .last_run
         git add .last_run
         git diff --staged --quiet || git commit -m "Bot run $(date +'%d %b %H:%M UTC')"
         git push || true
